<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life - Quản lý cá nhân</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon_mylife.png">
    <meta name="theme-color" content="#1e1e2d">
</head>
<body>
    <!-- App Container (Hidden initially until logged in) -->
    <div id="app-container" class="hidden" style="display: flex; width: 100%; min-height: 100vh;">
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        
        <!-- Sidebar -->
        <aside class="sidebar">
        <div class="logo" style="display: flex; align-items: center; gap: 8px; justify-content: center;">
            <img src="logo_mylife.png" alt="Logo" style="max-height: 40px; display: none;" onload="this.style.display='block'; document.getElementById('fallback-sidebar-logo').style.display='none'" onerror="this.style.display='none'; document.getElementById('fallback-sidebar-logo').style.display='flex'">
            <span id="fallback-sidebar-logo" style="display: flex; align-items: center; gap: 8px;">
                <ion-icon name="planet-outline"></ion-icon>
                My Life
            </span>
        </div>
        <ul class="nav-links" id="dynamic-nav-links">
            <!-- Dynamic links will be injected here -->
        </ul>
        <div style="margin-top: auto;">
            <ul class="nav-links">
                <li class="nav-link" data-target="admin">
                    <ion-icon name="settings-outline"></ion-icon> Quản trị Admin
                </li>
                <li class="nav-link" id="btn-logout" style="color: var(--danger-color);">
                    <ion-icon name="log-out-outline"></ion-icon> Đăng xuất
                </li>
            </ul>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header" style="display: flex; align-items: center; gap: 1rem;">
            <button id="btn-mobile-menu" class="btn hidden-desktop" style="background: transparent; color: var(--text-color); font-size: 1.5rem; padding: 0.5rem; display: none;">
                <ion-icon name="menu-outline"></ion-icon>
            </button>
            <h1 id="page-title" style="flex: 1; margin: 0;">Tổng quan</h1>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button class="btn" id="btn-theme-toggle" style="background: transparent; color: var(--text-color); font-size: 1.2rem; padding: 0.5rem;" title="Chuyển giao diện Sáng/Tối">
                    <ion-icon name="moon-outline" id="theme-icon"></ion-icon>
                </button>
                <button class="btn hidden" id="btn-toggle-completed" style="background: rgba(255,255,255,0.1); color: var(--text-color); border: 1px solid var(--glass-border);" title="Hiện/Ẩn các công việc đã Hoàn thành">
                    <ion-icon name="eye-off-outline"></ion-icon> Ẩn việc Hoàn thành
                </button>
                <button class="btn hidden" id="btn-toggle-view" style="background: rgba(255,255,255,0.1); color: var(--text-color); border: 1px solid var(--glass-border);">
                    <ion-icon name="list-outline"></ion-icon> Dạng Bảng
                </button>
                <button class="btn hidden" id="btn-toggle-calendar" style="background: rgba(255,255,255,0.1); color: var(--text-color); border: 1px solid var(--glass-border);">
                    <ion-icon name="calendar-outline"></ion-icon> Lịch
                </button>
                <button class="btn btn-primary hidden" id="btn-add">
                    <ion-icon name="add-outline"></ion-icon> Thêm mới
                </button>
            </div>
        </header>

        <div id="content-area">
            <!-- Content will be dynamically loaded here -->
        </div>

        <div id="calendar-view-container" class="hidden" style="padding: 1rem;">
            <!-- Calendar will be dynamically rendered here -->
        </div>

        <!-- Quick Capture Floating Button -->
        <div class="fab" id="btn-quick-capture" title="Ghi chú nhanh (Quick Capture)">
            <ion-icon name="flash-outline"></ion-icon>
        </div>
    </main>
    </div> <!-- End App Container -->

    <!-- Login Screen -->
    <div id="login-container" class="modal-overlay active login-page-wrapper" style="position: fixed; height: 100vh; z-index: 9999;">
        <div class="modal glass-card login-glass-card" style="max-width: 400px; width: 90%; margin: 0 auto;">
            <div class="logo mb-4" style="display: flex; align-items: center; gap: 8px; justify-content: center;">
                <img src="logo_mylife.png" alt="Logo" style="max-height: 50px; display: none;" onload="this.style.display='block'; document.getElementById('fallback-login-logo').style.display='none'" onerror="this.style.display='none'; document.getElementById('fallback-login-logo').style.display='flex'">
                <span id="fallback-login-logo" style="display: flex; align-items: center; gap: 8px;">
                    <ion-icon name="planet-outline"></ion-icon>
                    My Life
                </span>
            </div>
            <h2 class="text-center mb-4">Đăng nhập</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="login-password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="width: 100%; justify-content: center;">
                    <ion-icon name="log-in-outline"></ion-icon> Vào ứng dụng
                </button>
            </form>
        </div>
    </div>

    <!-- Modal for Adding Data -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal glass-card">
            <div class="modal-header">
                <h2 id="modal-title">Thêm bản ghi mới</h2>
                <button class="close-btn" id="btn-close-modal"><ion-icon name="close-outline"></ion-icon></button>
            </div>
            <form id="add-form">
                <div id="form-fields">
                    <!-- Form fields will be dynamically generated based on sheet -->
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary w-100" id="btn-submit">
                        <ion-icon name="save-outline"></ion-icon> Lưu dữ liệu
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Quick Capture Modal -->
    <div class="modal-overlay" id="quick-capture-modal">
        <div class="modal glass-card">
            <div class="modal-header">
                <h2>Ghi chú nhanh (Inbox)</h2>
                <button class="close-btn" id="btn-close-quick-capture"><ion-icon name="close-outline"></ion-icon></button>
            </div>
            <form id="quick-capture-form">
                <div class="form-group">
                    <label>Nội dung ý tưởng / Yêu cầu công việc</label>
                    <textarea id="qc-content" class="form-control" rows="4" required placeholder="Gõ nhanh ý tưởng của bạn vào đây..."></textarea>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary w-100" id="btn-submit-qc">
                        <ion-icon name="send-outline"></ion-icon> Gửi vào Inbox
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Appointment Action Modal -->
    <div class="modal-overlay" id="apt-action-modal">
        <div class="modal glass-card">
            <div class="modal-header">
                <h2>Chi tiết Lịch hẹn</h2>
                <button class="close-btn" onclick="document.getElementById('apt-action-modal').classList.remove('active')"><ion-icon name="close-outline"></ion-icon></button>
            </div>
            <div id="apt-action-content" style="margin-bottom: 20px; line-height: 1.6; font-size: 0.95rem;">
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;" id="apt-action-buttons">
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
